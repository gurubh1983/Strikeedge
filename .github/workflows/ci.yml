name: strikeedge-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pytest httpx
      - run: pytest backend/tests -q

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive infra/terraform
      - run: terraform -chdir=infra/terraform/environments/dev init -backend=false
      - run: terraform -chdir=infra/terraform/environments/dev validate
      - run: terraform -chdir=infra/terraform/environments/staging init -backend=false
      - run: terraform -chdir=infra/terraform/environments/staging validate
      - run: terraform -chdir=infra/terraform/environments/preprod init -backend=false
      - run: terraform -chdir=infra/terraform/environments/preprod validate
      - run: terraform -chdir=infra/terraform/environments/prod init -backend=false
      - run: terraform -chdir=infra/terraform/environments/prod validate
